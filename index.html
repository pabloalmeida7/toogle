<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Toogle - O Seu buscador de Torrents</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── CONTEÚDO PRINCIPAL ── */
    main {
      flex: 1;
      width: 100%;
      max-width: 600px;
      padding: 60px 20px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── LOGO — troque o src pela sua imagem ── */
    .logo {
      margin-bottom: 32px;
    }

    .logo img {
      width: 272px; /* ajuste o tamanho aqui */
      display: block;
    }

    /* ── BARRA DE BUSCA ── */
    .barra {
      display: flex;
      gap: 8px;
      width: 100%;
      margin-bottom: 16px;
    }

    .barra input {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    .barra button {
      padding: 10px 20px;
      font-size: 1rem;
      cursor: pointer;
      border: none;
      background: #333;
      color: #fff;
      border-radius: 8px;
    }

    /* ── CATEGORIAS ── */
    .categorias {
      display: flex;
      gap: 16px;
      margin-bottom: 32px;
    }

    .categorias label {
      cursor: pointer;
      font-size: 0.9rem;
    }

    /* ── RESULTADOS ── */
    #resultados {
      width: 100%;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .card a {
      font-weight: bold;
      text-decoration: none;
      color: #1a0dab;
    }

    .card .fonte {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 4px;
    }

    /* ── PAGINAÇÃO ── */
    #paginacao {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    #paginacao button {
      padding: 6px 12px;
      border: 1px solid #ccc;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    #paginacao button.ativa {
      background: #333;
      color: #fff;
      border-color: #333;
    }

    /* ── RODAPÉ ── */
    footer {
      width: 100%;
      background: #000;
      color: #fff;
      text-align: center;
      padding: 16px;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <main>

    <!-- LOGO — troque o src pela sua imagem -->
    <div class="logo">
      <img src="logotipo/Toogle.svg" alt="Toogle Logotipo" />
    </div>

    <!-- BARRA DE BUSCA -->
    <div class="barra">
      <input id="input" type="text" placeholder="Buscar..." />
      <button onclick="buscar()">Buscar</button>
    </div>

    <!-- CATEGORIAS — ficam abaixo da barra -->
    <div class="categorias">
      <label><input type="radio" name="categoria" value="filmes" checked /> Filmes</label>
      <label><input type="radio" name="categoria" value="series" /> Séries</label>
      <label><input type="radio" name="categoria" value="jogos" /> Jogos</label>
      <label><input type="radio" name="categoria" value="softwares" /> Softwares</label>
    </div>

    <!-- RESULTADOS -->
    <div id="resultados"></div>
    <div id="paginacao"></div>

  </main>

  <!-- RODAPÉ -->
  <footer> © 2026 Toogle - Direitos autorais é meu ovo</footer>

  <script>
    // ─────────────────────────────────────────────
    // FONTES POR CATEGORIA
    // Edite as URLs de busca de cada site aqui.
    // {q} será substituído pelo termo buscado.
    // ─────────────────────────────────────────────
    const fontes = {
      filmes: [
        { nome: "Agência Brasil", url: "https://agenciabrasil.ebc.com.br/busca?keys={q}" },
        { nome: "Decreto",        url: "https://www.decretodigital.com.br/?s={q}" },
      ],
      series: [
        { nome: "The Pirate Bay",      url: "https://thepiratebay.org/search.php?q={q}&cat=208" },
        { nome: "Tableless",   url: "https://tableless.com.br/?s={q}" },
      ],
      jogos: [
        { nome: "arXiv",       url: "https://arxiv.org/search/?query={q}&searchtype=all" },
        { nome: "DOAJ",        url: "https://doaj.org/search/articles?source=%7B%22query%22%3A%7B%22query_string%22%3A%7B%22query%22%3A%22{q}%22%7D%7D%7D" },
      ],
      softwares: [
        { nome: "Vimeo",       url: "https://vimeo.com/search?q={q}" },
        { nome: "Soundcloud",  url: "https://soundcloud.com/search?q={q}" },
      ],
    };

    // ─────────────────────────────────────────────
    // PAGINAÇÃO
    // ─────────────────────────────────────────────
    const POR_PAGINA = 10; // ← altere o limite aqui
    let todosResultados = [];
    let paginaAtual = 1;

    function renderPagina(pagina) {
      paginaAtual = pagina;
      const container  = document.getElementById("resultados");
      const paginacao  = document.getElementById("paginacao");
      const inicio     = (pagina - 1) * POR_PAGINA;
      const fim        = inicio + POR_PAGINA;
      const fatia      = todosResultados.slice(inicio, fim);
      const totalPags  = Math.ceil(todosResultados.length / POR_PAGINA);

      container.innerHTML = fatia.map(({ fonte, url, titulo }) => `
        <div class="card">
          <div class="fonte">${fonte.nome}</div>
          <a href="${url}" target="_blank">${titulo}</a>
        </div>
      `).join("");

      // Botões de página
      paginacao.innerHTML = "";
      for (let i = 1; i <= totalPags; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        if (i === pagina) btn.classList.add("ativa");
        btn.addEventListener("click", () => {
          renderPagina(i);
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
        paginacao.appendChild(btn);
      }
    }

    // ─────────────────────────────────────────────
    // BUSCAR
    // ─────────────────────────────────────────────
    async function buscar() {
      const q         = document.getElementById("input").value.trim();
      const categoria = document.querySelector("input[name='categoria']:checked").value;
      const container = document.getElementById("resultados");

      if (!q) { container.innerHTML = "<p>Digite algo para buscar.</p>"; return; }

      container.innerHTML = "<p>Buscando...</p>";
      document.getElementById("paginacao").innerHTML = "";

      const lista = fontes[categoria];

      const lotes = await Promise.all(
        lista.map(fonte => {
          const url = fonte.url.replace("{q}", encodeURIComponent(q));
          return buscarResultados(url, fonte);
        })
      );

      // Intercala resultados de cada fonte (1 de cada por vez)
      todosResultados = [];
      const max = Math.max(...lotes.map(l => l.length));
      for (let i = 0; i < max; i++) {
        for (const lote of lotes) {
          if (lote[i]) todosResultados.push(lote[i]);
        }
      }

      renderPagina(1);
    }

    // ─────────────────────────────────────────────
    // FETCH DOS RESULTADOS VIA PROXY
    // Extrai links e títulos do HTML da página de busca.
    // Se um site mudar a estrutura, ajuste os seletores
    // dentro de extrairLinks().
    // ─────────────────────────────────────────────
    async function buscarResultados(urlBusca, fonte) {
      try {
            const res = await fetch('https://corsproxy.io/?' + encodeURIComponent(urlBusca));
            const data = await res.text();
            const parser = new DOMParser();
            const doc = parser.parseFromString(data, 'text/html');
            return extrairLinks(doc, urlBusca, fonte);
            } catch {
            return [{ titulo: 'Erro ao carregar ' + fonte.nome, url: urlBusca, fonte }];
            }
    }

    // Extrai links relevantes do HTML.
    // Prioriza headings e tags de artigo, depois links gerais.
    // Ignora navegação, login, etc.
    function extrairLinks(doc, urlBase, fonte) {
      const origem  = new URL(urlBase).origin;
      const ignorar = /login|signup|signin|cadastro|conta|account|cart|subscribe|javascript|#|mailto|cookie|privacy|termo|about|contato/i;
      const vistos  = new Set();
      const resultados = [];

      const seletores = [
        "h1 a", "h2 a", "h3 a",
        "article a", ".result a", ".search-result a",
        ".post-title a", ".entry-title a", ".titulo a",
        "li a", "a"
      ];

      for (const seletor of seletores) {
        for (const a of doc.querySelectorAll(seletor)) {
          let href  = (a.getAttribute("href") || "").trim();
          const texto = a.textContent.trim().replace(/\s+/g, " ");

          if (!texto || texto.length < 15) continue;
          if (ignorar.test(href)) continue;
          if (href.startsWith("/")) href = origem + href;
          if (!href.startsWith("http")) continue;
          if (vistos.has(href)) continue;

          try {
            const u = new URL(href);
            if (u.pathname === "/" || u.pathname === "") continue;
          } catch { continue; }

          vistos.add(href);
          resultados.push({ titulo: texto.slice(0, 100), url: href, fonte });
          if (resultados.length >= 20) break;
        }
        if (resultados.length >= 20) break;
      }

      if (resultados.length === 0) {
        resultados.push({ titulo: "Ver resultados no " + fonte.nome, url: urlBase, fonte });
      }

      return resultados;
    }

    // Busca ao pressionar Enter
    document.getElementById("input").addEventListener("keydown", e => {
      if (e.key === "Enter") buscar();
    });
  </script>

</body>
</html>
